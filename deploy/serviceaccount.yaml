# Namespace + ServiceAccount for fab workloads running inside the cluster.
#
# The IRSA annotation binds the ServiceAccount to an AWS IAM role, so pods
# receive short-lived AWS credentials with no static key. The role itself
# is an AWS resource — provision it in the cloud-infra layer (landing-zone,
# or the eks-agent-platform Tenant reconciler) and put its ARN here. It
# needs `bedrock:InvokeModel` and `bedrock:InvokeModelWithResponseStream`
# on the Claude models in use; that is the credential `FAB_INFERENCE=bedrock`
# authenticates with.
apiVersion: v1
kind: Namespace
metadata:
  name: fab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fab
  namespace: fab
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<FAB_BEDROCK_ROLE>
